
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Farmer Marketplace</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="nav-brand">🌾 Smart Farmer</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html" class="btn btn-outline">Login</a>
            </div>
        </nav>
    </header>

    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-card">
                <h1>Register</h1>
                <p class="auth-subtitle">Join the Smart Farmer Marketplace</p>

                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="regName">Name</label>
                        <input type="text" id="regName" name="name" placeholder="Enter your full name" autocomplete="name">
                        <span class="error-msg" id="regNameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" name="email" placeholder="Enter your email" autocomplete="email">
                        <span class="error-msg" id="regEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label for="regPhone">Phone</label>
                        <input type="tel" id="regPhone" name="phone" placeholder="10-digit phone number" autocomplete="tel">
                        <span class="error-msg" id="regPhoneError"></span>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" name="password" placeholder="Minimum 6 characters" autocomplete="new-password">
                        <span class="error-msg" id="regPasswordError"></span>
                    </div>
                    <div class="form-group">
                        <label for="regRole">Role</label>
                        <select id="regRole" name="role">
                            <option value="farmer">Farmer</option>
                            <option value="buyer">Buyer</option>
                        </select>
                        <span class="error-msg" id="regRoleError"></span>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Register</button>
                </form>

                <p class="auth-footer">
                    Already have an account? <a href="login.html">Login here</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
