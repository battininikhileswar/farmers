<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Farmer Marketplace</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="nav-brand">🌾 Smart Farmer</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="register.html" class="btn btn-outline">Register</a>
            </div>
        </nav>
    </header>

    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-card">
                <h1>Login</h1>
                <p class="auth-subtitle">Welcome back! Enter your credentials.</p>

                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" name="email" placeholder="Enter your email" autocomplete="email">
                        <span class="error-msg" id="loginEmailError"></span>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" name="password" placeholder="Enter your password" autocomplete="current-password">
                        <span class="error-msg" id="loginPasswordError"></span>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Login</button>
                </form>

                <p class="auth-footer">
                    Don't have an account? <a href="register.html">Register here</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
